<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="screen">
    <div class="auth-container">
      <h1>Finance Dashboard</h1>
      <div class="tabs">
        <button class="tab active" onclick="showTab('login')">Login</button>
        <button class="tab" onclick="showTab('register')">Register</button>
      </div>
      <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
        <input type="email" id="login-email" placeholder="Email" required>
        <input type="password" id="login-password" placeholder="Password" required>
        <button type="submit" class="btn primary">Login</button>
      </form>
      <form id="register-form" class="auth-form hidden" onsubmit="handleRegister(event)">
        <input type="text" id="reg-username" placeholder="Username" required>
        <input type="email" id="reg-email" placeholder="Email" required>
        <input type="password" id="reg-password" placeholder="Password (min 8, upper+lower+digit)" required>
        <button type="submit" class="btn primary">Register</button>
      </form>
      <div id="auth-message" class="message"></div>
      <div class="quick-login">
        <p>Quick Login:</p>
        <button class="btn small" onclick="quickLogin('superadmin@finance.local','SuperAdmin@123')">Super Admin</button>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app-screen" class="screen hidden">
    <!-- HEADER -->
    <header>
      <div class="header-left">
        <h2>Finance Dashboard</h2>
      </div>
      <div class="header-right">
        <span id="user-info"></span>
        <span id="user-role" class="badge"></span>
        <button class="btn small danger" onclick="handleLogout()">Logout</button>
      </div>
    </header>

    <!-- NAV -->
    <nav>
      <button class="nav-btn active" onclick="navigate('dashboard')">Dashboard</button>
      <button class="nav-btn" onclick="navigate('records')">Records</button>
      <button class="nav-btn" onclick="navigate('users')">Users</button>
      <button class="nav-btn" onclick="navigate('audit')">Audit Logs</button>
      <button class="nav-btn" onclick="navigate('health')">Health</button>
    </nav>

    <!-- PAGES -->
    <main>
      <!-- DASHBOARD PAGE -->
      <section id="page-dashboard" class="page">
        <h3>Dashboard Summary</h3>
        <div class="date-filter">
          <label>From: <input type="date" id="dash-from" value="2026-01-01"></label>
          <label>To: <input type="date" id="dash-to" value="2026-12-31"></label>
          <button class="btn small" onclick="loadDashboard()">Apply</button>
        </div>
        <div class="cards" id="summary-cards"></div>

        <div class="grid-2">
          <div class="card">
            <h4>Category Breakdown</h4>
            <div id="categories-list" class="table-container"></div>
          </div>
          <div class="card">
            <h4>Top Categories</h4>
            <div class="grid-2">
              <div>
                <h5>Top Expenses</h5>
                <div id="top-expenses"></div>
              </div>
              <div>
                <h5>Top Income</h5>
                <div id="top-income"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <h4>Monthly Trends</h4>
          <div class="trend-controls">
            <select id="trend-period" onchange="loadTrends()">
              <option value="monthly">Monthly</option>
              <option value="weekly">Weekly</option>
            </select>
            <select id="trend-months" onchange="loadTrends()">
              <option value="3">3 Months</option>
              <option value="6" selected>6 Months</option>
              <option value="12">12 Months</option>
            </select>
          </div>
          <div id="trends-table" class="table-container"></div>
        </div>

        <div class="card">
          <h4>Recent Activity</h4>
          <div id="recent-activity" class="table-container"></div>
        </div>
      </section>

      <!-- RECORDS PAGE -->
      <section id="page-records" class="page hidden">
        <div class="page-header">
          <h3>Financial Records</h3>
          <div class="page-actions">
            <input type="text" id="search-input" placeholder="Search (min 2 chars)..." oninput="handleSearch()">
            <button class="btn primary" onclick="showModal('record-modal')">+ New Record</button>
          </div>
        </div>
        <div id="search-results" class="search-dropdown hidden"></div>

        <!-- Filters -->
        <div class="filters">
          <select id="filter-type" onchange="loadRecords()">
            <option value="">All Types</option>
            <option value="income">Income</option>
            <option value="expense">Expense</option>
          </select>
          <input type="text" id="filter-category" placeholder="Category" onchange="loadRecords()">
          <input type="date" id="filter-from" onchange="loadRecords()">
          <input type="date" id="filter-to" onchange="loadRecords()">
          <select id="filter-sort" onchange="loadRecords()">
            <option value="date">Sort by Date</option>
            <option value="amount">Sort by Amount</option>
            <option value="category">Sort by Category</option>
          </select>
        </div>

        <div id="records-table" class="table-container"></div>
        <div class="pagination">
          <button class="btn small" id="load-more-btn" onclick="loadMoreRecords()" style="display:none">Load More</button>
        </div>
      </section>

      <!-- USERS PAGE -->
      <section id="page-users" class="page hidden">
        <h3>User Management</h3>
        <div id="users-table" class="table-container"></div>
      </section>

      <!-- AUDIT PAGE -->
      <section id="page-audit" class="page hidden">
        <h3>Audit Logs</h3>
        <div class="filters">
          <select id="audit-action" onchange="loadAuditLogs()">
            <option value="">All Actions</option>
            <option value="create">Create</option>
            <option value="update">Update</option>
            <option value="delete">Delete</option>
            <option value="soft_delete">Soft Delete</option>
            <option value="login">Login</option>
          </select>
          <select id="audit-resource" onchange="loadAuditLogs()">
            <option value="">All Resources</option>
            <option value="user">User</option>
            <option value="record">Record</option>
            <option value="auth">Auth</option>
          </select>
        </div>
        <div id="audit-table" class="table-container"></div>
      </section>

      <!-- HEALTH PAGE -->
      <section id="page-health" class="page hidden">
        <h3>System Health</h3>
        <div id="health-status"></div>
      </section>
    </main>

    <!-- NOTIFICATION -->
    <div id="notification" class="notification hidden"></div>

    <!-- RECORD MODAL -->
    <div id="record-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="record-modal-title">New Record</h3>
          <button class="close-btn" onclick="hideModal('record-modal')">&times;</button>
        </div>
        <form id="record-form" onsubmit="handleRecordSubmit(event)">
          <input type="hidden" id="record-id">
          <div class="form-grid">
            <div class="form-group">
              <label>Amount</label>
              <input type="number" id="record-amount" step="0.01" min="0.01" required>
            </div>
            <div class="form-group">
              <label>Type</label>
              <select id="record-type" required>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
              </select>
            </div>
            <div class="form-group">
              <label>Category</label>
              <input type="text" id="record-category" required>
            </div>
            <div class="form-group">
              <label>Date</label>
              <input type="date" id="record-date" required>
            </div>
            <div class="form-group full-width">
              <label>Description</label>
              <textarea id="record-description" rows="2"></textarea>
            </div>
            <div class="form-group full-width">
              <label>Tags (comma-separated)</label>
              <input type="text" id="record-tags" placeholder="e.g. monthly, salary">
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn" onclick="hideModal('record-modal')">Cancel</button>
            <button type="submit" class="btn primary">Save</button>
          </div>
        </form>
      </div>
    </div>

    <!-- ROLE MODAL -->
    <div id="role-modal" class="modal hidden">
      <div class="modal-content small">
        <div class="modal-header">
          <h3>Change Role</h3>
          <button class="close-btn" onclick="hideModal('role-modal')">&times;</button>
        </div>
        <form onsubmit="handleRoleChange(event)">
          <input type="hidden" id="role-user-id">
          <div class="form-group">
            <label>New Role</label>
            <select id="new-role" required>
              <option value="viewer">Viewer</option>
              <option value="analyst">Analyst</option>
              <option value="manager">Manager</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn" onclick="hideModal('role-modal')">Cancel</button>
            <button type="submit" class="btn primary">Assign</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
